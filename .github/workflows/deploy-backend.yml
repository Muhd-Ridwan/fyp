name: Deploy Backend to AWS EB

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate https.config from template
        run: |
          python3 << 'PYEOF'
          cert = """${{ secrets.CF_ORIGIN_CERT }}"""
          key = """${{ secrets.CF_ORIGIN_KEY }}"""

          def to_yaml_block(text, indent=6):
              pad = " " * indent
              return "|\n" + "\n".join(pad + line for line in text.strip().split("\n"))

          with open("backend/.ebextensions/https.config.template") as f:
              template = f.read()
            
          result = template.replace('"CERT_PLACEHOLDER"', to_yaml_block(cert))
          result = result.replace('"KEY_PLACEHOLDER"', to_yaml_block(key))

          with open("backend/.ebextensions/https.config", "w") as f:
              f.write(result)

          print("https.config generated successfully")
          PYEOF

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../deploy.zip . -x ".git/*" ".elasticbeanstalk/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY_ACCESS_KEY }}
          application_name: fyp-backend-prod
          environment_name: Fyp-backend-prod-env
          version_label: ${{ github.sha }}-${{ github.run_attempt }}
          region: ap-southeast-2
          deployment_package: deploy.zip
          wait_for_environment_recovery: 300
