name: Deploy Backend to AWS EB

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version (for rollback)
        id: current_version
        run: |
          CURRENT=$(aws elasticbeanstalk describe-environments \
            --environment-names Fyp-backend-prod-env \
            --region ap-southeast-2 \
            --query 'Environments[0].VersionLabel' \
            --output text)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2

      - name: Generate https.config from template
        run: |
          python3 << 'PYEOF'
          import re

          cert = """${{ secrets.CF_ORIGIN_CERT }}"""
          key = """${{ secrets.CF_ORIGIN_KEY }}"""

          def to_indented(text, indent=6):
              pad = " " * indent
              return "\n".join(pad + line for line in text.strip().split("\n"))

          with open("backend/.ebextensions/https.config.template") as f:
              template = f.read()

          result = re.sub(r'[ \t]*CERT_PLACEHOLDER', to_indented(cert), template)
          result = re.sub(r'[ \t]*KEY_PLACEHOLDER', to_indented(key), result)

          with open("backend/.ebextensions/https.config", "w") as f:
              f.write(result)

          print("https.config generated successfully")
          PYEOF

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../deploy.zip . -x ".git/*" ".elasticbeanstalk/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY_ACCESS_KEY }}
          application_name: fyp-backend-prod
          environment_name: Fyp-backend-prod-env
          version_label: ${{ github.sha }}-${{ github.run_attempt }}
          region: ap-southeast-2
          deployment_package: deploy.zip
          wait_for_environment_recovery: 60

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back to ${{ steps.current_version.outputs.version }}"
          aws elasticbeanstalk update-environment \
            --environment-name Fyp-backend-prod-env \
            --region ap-southeast-2 \
            --version-label ${{ steps.current_version.outputs.version }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2
